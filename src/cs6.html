<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大国重器 · 强国成就</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑", "Microsoft YaHei", sans-serif;}
body{background:#f5f5f5;color:#333;}
.navbar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #2c3e50;
    color: white;
    position: sticky;
    top: 0;
    z-index: 999;
}
.back-btn{
    padding: 8px 16px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}
.back-btn:hover{
    background: #2980b9;
}
.nav-title{
    font-size: 16px;
    font-weight: 500;
}
.header{
    padding: 20px 0;
    background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    text-align:center;
}
.header h1{
    font-size:24px;
    font-weight:600;
    color:#1a1a1a;
}
.container{
    max-width:1280px;
    margin:0 auto;
    padding:30px 15px;
}
.achieve-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap:20px;
}
.achieve-card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.06);
    transition:all 0.3s ease;
}
.achieve-card:hover{
    transform:translateY(-5px);
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.card-img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-title{
    padding:15px 0;
    text-align:center;
    font-size:16px;
    font-weight:500;
    color:#222;
    border-top:1px solid #f0f0f0;
}
.footer{
    padding:20px 0;
    text-align:center;
    color:#666;
    font-size:14px;
    background:#fff;
    margin-top:20px;
}
@media (max-width: 768px){
    .navbar{
        padding: 10px 15px;
    }
    .back-btn{
        padding: 6px 12px;
        font-size: 13px;
    }
    .header h1{
        font-size: 20px;
    }
    .card-title{
        font-size: 15px;
    }
    .card-img{
        height: 160px;
    }
}
</style>
</head>
<body>

<!-- 导航栏 - 新增 -->
<div class="navbar">
    <button class="back-btn" onclick="window.location.href='./cs4.html'">← 返回原网页</button>

  </div>

<div class="footer">
  大国成就 · 见证辉煌 © 2026

</html>
